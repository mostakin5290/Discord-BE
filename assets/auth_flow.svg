<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250">
  <rect width="800" height="250" fill="#2C2F33"/>
  <style>
    .box { fill: #23272A; stroke: #5865F2; stroke-width: 2; rx: 8; }
    .text { fill: #FFFFFF; font-family: Segoe UI, Arial, sans-serif; font-size: 14px; text-anchor: middle; font-weight: 500; }
    .arrow { stroke: #99AAB5; stroke-width: 2; marker-end: url(#arrow); }
    .label { fill: #B9BBBE; font-size: 11px; text-anchor: middle; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#99AAB5"/>
    </marker>
  </defs>

  <!-- Nodes -->
  <rect x="30" y="100" width="80" height="50" class="box"/>
  <text x="70" y="130" class="text">Client</text>

  <rect x="180" y="100" width="100" height="50" class="box"/>
  <text x="230" y="130" class="text">API Gateway</text>

  <rect x="350" y="100" width="100" height="50" class="box" stroke="#EB459E"/>
  <text x="400" y="130" class="text">Auth Service</text>

  <rect x="520" y="100" width="100" height="50" class="box" stroke="#FEE75C"/>
  <text x="570" y="130" class="text">Database</text>

  <rect x="680" y="100" width="90" height="50" class="box" stroke="#57F287"/>
  <text x="725" y="130" class="text">Session/JWT</text>

  <!-- Flow -->
  <line x1="110" y1="125" x2="180" y2="125" class="arrow"/>
  <text x="145" y="120" class="label">POST /login</text>
  
  <line x1="280" y1="125" x2="350" y2="125" class="arrow"/>
  <text x="315" y="120" class="label">Validate</text>
  
  <line x1="450" y1="125" x2="520" y2="125" class="arrow"/>
  <text x="485" y="120" class="label">Check User</text>
  
  <path d="M 570 150 Q 570 180 400 180 Q 230 180 230 150" fill="none" class="arrow" stroke-dasharray="4"/>
  <text x="400" y="195" class="label">Return JWT Token</text>
</svg>
