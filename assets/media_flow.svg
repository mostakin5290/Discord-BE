<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 300">
  <rect width="700" height="300" fill="#2C2F33"/>
  <style>
    .box { fill: #23272A; stroke: #5865F2; stroke-width: 2; rx: 8; }
    .text { fill: #FFFFFF; font-family: Segoe UI, Arial, sans-serif; font-size: 14px; text-anchor: middle; font-weight: 500; }
    .arrow { stroke: #99AAB5; stroke-width: 2; marker-end: url(#arrow); }
    .label { fill: #B9BBBE; font-size: 12px; text-anchor: middle; }
    .livekit { stroke: #57F287; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#99AAB5"/>
    </marker>
  </defs>

  <!-- Nodes -->
  <rect x="30" y="120" width="80" height="50" class="box"/> 
  <text x="70" y="150" class="text">Client A</text>

  <rect x="180" y="50" width="100" height="50" class="box"/>
  <text x="230" y="80" class="text">API Gateway</text>

  <rect x="350" y="50" width="100" height="50" class="box"/>
  <text x="400" y="80" class="text">Media Service</text>

  <rect x="300" y="180" width="120" height="60" class="box livekit"/>
  <text x="360" y="210" class="text">LiveKit Server</text>
  <text x="360" y="230" class="text" font-size="10">(SFU / WebRTC)</text>

  <rect x="580" y="120" width="80" height="50" class="box"/>
  <text x="620" y="150" class="text">Client B</text>

  <!-- Flow -->
  <!-- Token Generation -->
  <line x1="80" y1="120" x2="180" y2="75" class="arrow"/>
  <text x="130" y="90" class="label">1. Request Token</text>

  <line x1="280" y1="75" x2="350" y2="75" class="arrow"/>
  
  <line x1="350" y1="100" x2="110" y2="150" class="arrow"/>
  <text x="230" y="140" class="label">2. Return Token</text>

  <!-- Connection -->
  <line x1="110" y1="170" x2="300" y2="210" class="arrow"/>
  <text x="200" y="200" class="label">3. Connect (WebRTC)</text>

  <line x1="620" y1="170" x2="420" y2="210" class="arrow"/>
  <text x="520" y="200" class="label">Subscribe</text>

  <line x1="360" y1="180" x2="360" y2="180" class="arrow"/> <!-- Self loop visual? No -->
  
</svg>
